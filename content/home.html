<section class="panel">
  <h2>Добавить заметку</h2>
  <form id="note-form" class="note-form">
    <input id="note-input" type="text" placeholder="Введите текст заметки" required>
    <input id="note-datetime" type="datetime-local" aria-label="Дата и время напоминания">
    <button type="submit" class="action-btn action-btn-primary">Добавить</button>
  </form>
</section>

<section class="panel">
  <div class="section-head">
    <h2>Список заметок</h2>
    <span id="notes-counter" class="counter">0 записей</span>
  </div>
  <ul id="notes-list" class="notes-list"></ul>
</section>
