<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- Web App Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Для Android -->
  <meta name="mobile-web-app-capable" content="yes">

  <!-- Цвет темы для браузера -->
  <meta name="theme-color" content="#4285f4">

  <!-- Для iOS (иконка на домашний экран) -->
  <link rel="apple-touch-icon" href="icons/favicon-128x128.png">

  <!-- Для iOS (статус бар) -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <title>Мои заметки (PWA)</title>
  <link rel="stylesheet" href="https://unpkg.com/chota@latest">
  <link rel="icon" href="icons/favicon.ico" sizes="16x16" type="image/ico">
  
  <style>
    body {
      padding: 1rem;
      max-width: 800px;
      margin: 0 auto;
    }
    #notes-list {
      margin-top: 1rem;
      list-style: none;
      padding: 0;
    }
    #notes-list li {
      background: #f5f5f5;
      margin: 0.5rem 0;
      padding: 0.75rem;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .delete-btn {
      background: #ff6b6b;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 0.25rem 0.75rem;
      cursor: pointer;
    }
    .delete-btn:hover {
      background: #ff4757;
    }
    h1 {
      font-size: 1.8rem;
    }
  </style>
</head>
<body>
  <h1>📝 Мои заметки</h1>
  <p>Приложение работает офлайн и может быть установлено на устройство.</p>

  <form id="note-form" class="row">
    <input class="col-9" type="text" id="note-input" placeholder="Введите заметку..." required>
    <button class="col-3" type="submit">➕ Добавить</button>
  </form>

  <ul id="notes-list"></ul>

  <script src="app.js"></script>
</body>
</html>
