<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2f6fed">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/favicon-128x128.png">
  <link rel="icon" href="/icons/favicon.ico" sizes="16x16" type="image/x-icon">
  <link rel="stylesheet" href="/style.css">
  <title>Заметки PWA</title>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">Практические 15-18</p>
        <h1>Заметки</h1>
        <p class="subtitle">PWA с App Shell, офлайн-режимом, WebSocket, push-уведомлениями и напоминаниями</p>
      </div>

      <nav class="tabs" aria-label="Навигация приложения">
        <button id="home-btn" class="tab active" type="button">Главная</button>
        <button id="about-btn" class="tab" type="button">О приложении</button>
      </nav>
    </header>

    <main id="app-content" class="app-content" aria-live="polite">
      <div class="loading-state">Загрузка...</div>
    </main>

    <footer class="app-footer">
      <div class="push-actions">
        <button id="enable-push" class="action-btn action-btn-primary" type="button">
          Включить уведомления
        </button>
        <button id="disable-push" class="action-btn action-btn-secondary hidden" type="button">
          Отключить уведомления
        </button>
      </div>
      <p id="status-line" class="status-line">Приложение готово к работе офлайн после первого посещения.</p>
    </footer>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js"></script>
</body>
</html>
